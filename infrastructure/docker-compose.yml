services:
  ollama:
    image: ollama/ollama:latest
    container_name: hackathon-ollama
    ports:
      - "11434:11434"
    environment:
      OLLAMA_HOST: 0.0.0.0
      OLLAMA_MODEL: qwen2.5:1.5b-instruct
    volumes:
      - ollama_data:/root/.ollama
    command:
      - /bin/sh
      - -lc
      - |
        ollama serve &
        server_pid=$$!
        until ollama list >/dev/null 2>&1; do
          sleep 1
        done
        if ! ollama list | grep -q "qwen2.5:1.5b-instruct"; then
          ollama pull qwen2.5:1.5b-instruct
        fi
        wait $$server_pid
    healthcheck:
      test: ["CMD-SHELL", "ollama list | grep -q 'qwen2.5:1.5b-instruct'"]
      interval: 10s
      timeout: 5s
      retries: 60

  redis:
    image: redis/redis-stack-server:7.2.0-v15
    container_name: hackathon-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20

  mcp-gateway:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    container_name: hackathon-mcp-gateway
    command: ["python", "-m", "uvicorn", "mcp_servers.gateway:app", "--host", "0.0.0.0", "--port", "8765"]
    ports:
      - "8765:8765"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8765/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    env_file:
      - ../.env
    environment:
      GUARDRAIL_MODEL: ollama_chat/qwen2.5:1.5b-instruct
      SUMMARIZER_MODEL: ollama_chat/qwen2.5:1.5b-instruct
      PROFILER_MODEL: ollama_chat/qwen2.5:1.5b-instruct
      SUPERVISOR_ROUTER_MODEL: ollama_chat/qwen2.5:1.5b-instruct
      OLLAMA_API_BASE: http://ollama:11434
      LITELLM_MODEL_PROFILER: ollama_chat/qwen2.5:1.5b-instruct
      LITELLM_MODEL_PLANNER: ollama_chat/qwen2.5:1.5b-instruct
      LITELLM_MODEL_RESPONDER: ollama_chat/qwen2.5:1.5b-instruct
      LITELLM_MODEL_GUARDRAIL: ollama_chat/qwen2.5:1.5b-instruct
      LITELLM_MODEL_SUMMARIZER: ollama_chat/qwen2.5:1.5b-instruct
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      ANALYTICS_MODELS_DIR: /app/analytics/models
      FICHA_PREFIX: "ficha:"
      FICHA_TTL_SECONDS: 86400
      MCP_GATEWAY_URL: http://mcp-gateway:8765
      OTEL_ENABLED: "true"
      OTEL_SERVICE_NAME: havi-backend
    depends_on:
      ollama:
        condition: service_healthy
      redis:
        condition: service_healthy
      mcp-gateway:
        condition: service_started
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ../frontend-demo
      dockerfile: Dockerfile
    environment:
      BACKEND_STREAM_URL: http://backend:8080/chat/stream
      BACKEND_API_URL: http://backend:8080
      VITE_API_URL: http://localhost:8080
      VITE_WS_URL: ws://localhost:8080
    depends_on:
      backend:
        condition: service_started
    ports:
      - "8081:8081"

volumes:
  ollama_data:

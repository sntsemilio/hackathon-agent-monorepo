services:
  redis:
    image: redis/redis-stack-server:7.2.0-v15
    container_name: hackathon-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20

  mcp-gateway:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: hackathon-mcp-gateway
    command: ["python", "-m", "uvicorn", "mcp_servers.gateway:app", "--host", "0.0.0.0", "--port", "8765"]
    ports:
      - "8765:8765"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8765/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    env_file:
      - ../.env
    environment:
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      ANALYTICS_MODELS_DIR: /app/analytics/models
      FICHA_PREFIX: "ficha:"
      FICHA_TTL_SECONDS: 86400
      MCP_GATEWAY_URL: http://mcp-gateway:8765
      OTEL_ENABLED: "true"
      OTEL_SERVICE_NAME: havi-backend
    depends_on:
      redis:
        condition: service_healthy
      mcp-gateway:
        condition: service_started
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    environment:
      BACKEND_STREAM_URL: http://backend:8080/chat/stream
      BACKEND_API_URL: http://backend:8080
      VITE_API_URL: http://localhost:8080
      VITE_WS_URL: ws://localhost:8080
    depends_on:
      backend:
        condition: service_started
    ports:
      - "8081:8081"

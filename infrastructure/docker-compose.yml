services:
  redis:
    image: redis/redis-stack-server:7.2.0-v15
    container_name: hackathon-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    env_file:
      - ../.env
    environment:
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    environment:
      BACKEND_STREAM_URL: http://backend:8080/chat/stream
      BACKEND_API_URL: http://backend:8080
    depends_on:
      backend:
        condition: service_started
    ports:
      - "8081:8081"

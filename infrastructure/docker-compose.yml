services:
  redis:
    image: redis/redis-stack-server:7.2.0-v15
    container_name: hackathon-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    env_file:
      - ../.env
    environment:
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      BACKEND_HOST: 0.0.0.0
      BACKEND_PORT: 8000
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ../frontend-demo
      dockerfile: Dockerfile
    depends_on:
      backend:
        condition: service_started
    ports:
      - "3000:3000"
